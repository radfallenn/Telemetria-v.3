name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Fix windows and card height
        run: node scripts/patch-v4-windows-card-height.js

      - name: Apply independent hard navigation
        run: node scripts/patch-v4-hard-nav.js

      - name: Apply RPM C gauge and full-frame
        run: node scripts/patch-v4-rpm-c-fullframe.js

      - name: Separate RPM total and fuel cards
        run: node scripts/patch-v4-separate-rpm-total-fuel.js

      - name: Apply laps and fuel fixes
        run: node scripts/patch-v4-laps-fuel-references.js

      - name: Apply performance and stability fix
        run: node scripts/patch-v4-performance-stability.js

      - name: Compact cards and section max speed
        run: node scripts/patch-v4-compact-core-cards-section-max.js

      - name: Organize dashboard and add movement arrows
        run: node scripts/patch-v4-grid-arrows-all-attributes.js

      - name: Add total last lap and general average cards
        run: node scripts/patch-v4-total-last-average-cards.js

      - name: Remove card designer and install attribute database
        run: node scripts/patch-v4-remove-designer-expand-attributes.js

      - name: Add attribute checks to dashboard
        run: node scripts/patch-v4-attribute-checkbox-dashboard.js

      - name: Remove ATRIB page and marked dashboard cards
        run: node scripts/patch-v4-remove-attributes-and-marked-cards.js

      - name: Install GT7 Bridge reader and diagnostics
        run: node scripts/install-bridge-from-v408-apk.js

      - name: Validate GT7 communication and simplified UI
        run: |
          set -euo pipefail
          test -s www/index.html
          test -s www/bridge-v408.js
          test -s www/telemetry-attributes.json
          node --check www/bridge-v408.js
          node <<'NODE'
          const fs=require('fs');
          const index=fs.readFileSync('www/index.html','utf8');
          const bridge=fs.readFileSync('www/bridge-v408.js','utf8');
          const attrs=JSON.parse(fs.readFileSync('www/telemetry-attributes.json','utf8'));
          const ok=(v,m)=>{if(!v)throw new Error(m);console.log('OK:',m)};
          const ids=new Set(Array.isArray(attrs)?attrs.map(a=>a&&a.id).filter(Boolean):[]);
          ok(Array.isArray(attrs)&&attrs.length>=48,`${attrs.length} atributos válidos disponíveis no banco`);
          for(const id of ['speedKmh','rpm','gear','throttlePct','brakePct','fuelPct','bestLapMs','lastLapMs'])ok(ids.has(id),`atributo essencial presente: ${id}`);
          ok((index.match(/bridge-v408\.js/g)||[]).length===1,'uma única Bridge no HTML');
          ok(bridge.includes("const DEFAULT_PS5 = '192.168.1.81'"),'PS5 padrão 192.168.1.81');
          ok(bridge.includes("message: 'A'"),'heartbeat GT7 tipo A documentado');
          ok(bridge.includes('destinationPort: 33739'),'porta de heartbeat 33739');
          ok(bridge.includes('udpReceivePort: 33740'),'porta de recepção 33740');
          ok(bridge.includes('function adapt(raw)'),'adaptador V4.08 instalado');
          ok(bridge.includes('telemetryReceiving'),'diagnóstico de pacotes instalado');
          ok(bridge.includes('setPs5Ip:savePs5Ip'),'IP do PS5 editável');
          ok(!/<section\b[^>]*id=["']attributes["'][^>]*>/i.test(index),'página ATRIB removida');
          ok(!/<button\b[^>]*data-page=["']attributes["'][^>]*>/i.test(index),'botão ATRIB removido');
          ok(index.includes('V4 REMOVE ATTRIBUTES PAGE AND MARKED CARDS'),'limpeza final instalada');
          ok(!index.includes('192.168.1.71'),'IP antigo removido');
          NODE

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Allow local HTTP network
        run: node scripts/patch-android-network.js

      - name: Validate minimal Android permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$MANIFEST"
          grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"
          ! grep -q 'TelemetryForegroundService' "$MANIFEST"
          ! grep -q 'android.permission.WAKE_LOCK' "$MANIFEST"
          ! grep -q 'android.permission.FOREGROUND_SERVICE' "$MANIFEST"
          ! grep -q 'android.permission.POST_NOTIFICATIONS' "$MANIFEST"

      - name: Gradle permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/GT7-Telemetria-V4.18-Sem-Atributos-debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GT7-Telemetria-V4.18-Sem-Atributos
          path: release/GT7-Telemetria-V4.18-Sem-Atributos-debug.apk