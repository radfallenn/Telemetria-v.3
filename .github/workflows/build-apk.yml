name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Patch app
        run: node scripts/patch-index.js
      - name: Patch advanced widgets
        run: node scripts/patch-advanced-widgets.js
      - name: Patch semicircle gauge
        run: node scripts/patch-semicircle-gauge.js
      - name: Patch V4 Stitch layout
        run: node scripts/patch-v4-stitch-layout.js
      - name: Patch V4 MD design
        run: node scripts/patch-v4-md-design.js
      - name: Add Android
        run: npx cap add android
      - name: Sync
        run: npx cap sync android
      - name: Patch Android background
        run: node scripts/patch-android-background.js
      - name: Gradle permission
        run: chmod +x android/gradlew
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Telemetria-v4-md-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
