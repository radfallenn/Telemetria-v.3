name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Validate Raspberry GT7 Bridge
        run: |
          set -euo pipefail
          node --check bridge/patch-single-socket.js
          node --check bridge/patch-udp-relay.js
          node bridge/patch-single-socket.js
          node bridge/patch-udp-relay.js
          node --check bridge/server.js
          grep -Fq "const udp=dgram.createSocket('udp4');" bridge/server.js
          grep -Fq "udp.send(b,0,b.length,PS5_PORT,config.ps5Ip,()=>{});" bridge/server.js
          ! grep -Fq "hb=dgram.createSocket('udp4')" bridge/server.js
          ! grep -Fq "hb.send(" bridge/server.js
          grep -Fq "GT7_UDP_RELAY_V1" bridge/server.js
          grep -Fq "function requestClientIp" bridge/server.js
          grep -Fq "function resolveRelayTargets" bridge/server.js
          grep -Fq "function normalizeRelayTargets" bridge/server.js
          grep -Fq "function relayPacket" bridge/server.js
          grep -Fq "rinfo.address!==config.ps5Ip" bridge/server.js
          grep -Fq "u.pathname==='/api/relay'&&req.method==='GET'" bridge/server.js
          grep -Fq "u.pathname==='/api/relay'&&req.method==='POST'" bridge/server.js
          node -e "const c=require('./bridge/config.json');if(c.ps5Ip!=='192.168.1.81'||c.packetType!=='C'||!Array.isArray(c.relayTargets))process.exit(1)"
          node bridge/patch-udp-relay.js
          test "$(grep -o 'GT7_UDP_RELAY_V1' bridge/server.js | wc -l)" -eq 1

      - name: Fix windows and card height
        run: node scripts/patch-v4-windows-card-height.js

      - name: Apply independent hard navigation
        run: node scripts/patch-v4-hard-nav.js

      - name: Apply RPM C gauge and full-frame
        run: node scripts/patch-v4-rpm-c-fullframe.js

      - name: Separate RPM total and fuel cards
        run: node scripts/patch-v4-separate-rpm-total-fuel.js

      - name: Apply laps and fuel fixes
        run: node scripts/patch-v4-laps-fuel-references.js

      - name: Apply performance and stability fix
        run: node scripts/patch-v4-performance-stability.js

      - name: Compact cards and section max speed
        run: node scripts/patch-v4-compact-core-cards-section-max.js

      - name: Organize dashboard and add movement arrows
        run: node scripts/patch-v4-grid-arrows-all-attributes.js

      - name: Add total last lap and general average cards
        run: node scripts/patch-v4-total-last-average-cards.js

      - name: Remove card designer and install attribute database
        run: node scripts/patch-v4-remove-designer-expand-attributes.js

      - name: Add attribute checks to dashboard
        run: node scripts/patch-v4-attribute-checkbox-dashboard.js

      - name: Install GT7 Bridge reader and diagnostics
        run: node scripts/install-bridge-from-v408-apk.js

      - name: Install automatic Bridge and PS5 settings
        run: |
          node --check scripts/patch-v4-editable-network-settings.js
          node scripts/patch-v4-editable-network-settings.js
          node scripts/patch-v4-editable-network-settings.js

      - name: Install automatic app presets
        run: |
          node --check scripts/patch-v4-relay-settings-ui.js
          node scripts/patch-v4-relay-settings-ui.js
          node scripts/patch-v4-relay-settings-ui.js

      - name: Final removal of ATRIB and marked cards
        run: node scripts/patch-v4-remove-attributes-and-marked-cards.js

      - name: Validate final APK web package
        run: |
          set -euo pipefail
          test -s www/index.html
          test -s www/bridge-v408.js
          test -s www/telemetry-attributes.json
          node --check www/bridge-v408.js
          node <<'NODE'
          const fs=require('fs');
          const index=fs.readFileSync('www/index.html','utf8');
          const bridge=fs.readFileSync('www/bridge-v408.js','utf8');
          const attrs=JSON.parse(fs.readFileSync('www/telemetry-attributes.json','utf8'));
          const ok=(v,m)=>{if(!v)throw new Error(m);console.log('OK:',m)};
          const ids=new Set(Array.isArray(attrs)?attrs.map(a=>a&&a.id).filter(Boolean):[]);
          ok(Array.isArray(attrs)&&attrs.length>=48,`${attrs.length} atributos válidos no banco interno`);
          for(const id of ['speedKmh','rpm','gear','throttlePct','brakePct','fuelPct','bestLapMs','lastLapMs'])ok(ids.has(id),`atributo essencial: ${id}`);
          const bridgeTags=index.match(/<script\b(?=[^>]*\bsrc\s*=\s*["'][^"']*bridge-v408\.js(?:[?#][^"']*)?["'])[^>]*>\s*<\/script>/gi)||[];
          ok(bridgeTags.length===1,`uma única Bridge no HTML (${bridgeTags.length} tag)`);
          ok(bridge.includes("const DEFAULT_BRIDGE = 'http://192.168.1.70:8788'"),'Bridge padrão configurada');
          ok(bridge.includes("const DEFAULT_PS5 = '192.168.1.81'"),'PS5 padrão configurado');
          ok(bridge.includes('function saveNetworkSettings'),'salvamento automático instalado');
          ok(bridge.includes('function getBridgeUrl'),'Bridge dinâmica instalada');
          ok(bridge.includes('function getUdpPort'),'porta UDP instalada');
          ok(bridge.includes('function getHeartbeatPort'),'heartbeat instalado');
          ok(bridge.includes('async function getRelayStatus(){'),'leitura do relay instalada');
          ok(bridge.includes('async function saveRelayTargets(targets){'),'salvamento do relay instalado');
          ok(bridge.includes('getRelayStatus, saveRelayTargets,'),'API pública do relay instalada');
          for(const id of ['applyAutomaticNetwork','advancedNetworkSettings','editableBridgeUrl','editablePs5Ip','editableUdpPort','editableHeartbeatPort'])ok(index.includes(id),`controle automático/avançado presente: ${id}`);
          for(const id of ['relaySettingsCard','enableVictoryPreset','enableSimDashboardPreset','disableRelayPreset','advancedRelaySettings','relayTargetSelect','saveRelayTarget','removeRelayTarget','testRelayTarget'])ok(index.includes(id),`controle do relay presente: ${id}`);
          ok(index.includes('__CLIENT__'),'detecção automática do IP do celular instalada');
          ok((index.match(/V4 EDITABLE NETWORK SETTINGS UI/g)||[]).length===1,'uma única interface de conexão automática');
          ok((index.match(/V4 RELAY SETTINGS UI/g)||[]).length===1,'uma única interface de relay');
          ok(!/<section\b[^>]*id=["']attributes["'][^>]*>/i.test(index),'página ATRIB removida do HTML final');
          ok(!/<button\b[^>]*data-page=["']attributes["'][^>]*>/i.test(index),'botão ATRIB removido do HTML final');
          for(const field of ['rpmtotal','tyres','last','total'])ok(!new RegExp('<[^>]+data-field=["\\\']'+field+'["\\\']','i').test(index),`card removido: ${field}`);
          ok(!index.includes('192.168.1.71'),'IP antigo removido');
          NODE

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Allow local HTTP network
        run: node scripts/patch-android-network.js

      - name: Validate minimal Android permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$MANIFEST"
          grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"
          ! grep -q 'TelemetryForegroundService' "$MANIFEST"
          ! grep -q 'android.permission.WAKE_LOCK' "$MANIFEST"
          ! grep -q 'android.permission.FOREGROUND_SERVICE' "$MANIFEST"
          ! grep -q 'android.permission.POST_NOTIFICATIONS' "$MANIFEST"

      - name: Gradle permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/GT7-Telemetria-V4.23-Auto-Config-debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GT7-Telemetria-V4.23-Auto-Config
          path: release/GT7-Telemetria-V4.23-Auto-Config-debug.apk
