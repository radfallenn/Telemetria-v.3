name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Fix windows and card height
        run: node scripts/patch-v4-windows-card-height.js
      - name: Apply independent hard navigation
        run: node scripts/patch-v4-hard-nav.js
      - name: Apply fixed Bridge and PS5 network
        run: node scripts/patch-v4-fixed-network.js
      - name: Apply RPM C gauge and full-frame
        run: node scripts/patch-v4-rpm-c-fullframe.js
      - name: Separate RPM total and fuel cards
        run: node scripts/patch-v4-separate-rpm-total-fuel.js
      - name: Apply laps and fuel fixes
        run: node scripts/patch-v4-laps-fuel-references.js
      - name: Apply performance and stability fix
        run: node scripts/patch-v4-performance-stability.js
      - name: Compact cards and section max speed
        run: node scripts/patch-v4-compact-core-cards-section-max.js
      - name: Organize dashboard and add movement arrows
        run: node scripts/patch-v4-grid-arrows-all-attributes.js
      - name: Add total last lap and general average cards
        run: node scripts/patch-v4-total-last-average-cards.js
      - name: Remove card designer and install attribute database
        run: node scripts/patch-v4-remove-designer-expand-attributes.js
      - name: Add attribute checks to dashboard
        run: node scripts/patch-v4-attribute-checkbox-dashboard.js
      - name: Audit and install native Bridge controller last
        run: node scripts/patch-v4-bridge-audit-single-native.js
      - name: Validate final web package
        run: |
          test -f www/telemetry-attributes.json
          ! grep -qi "DESIGNER DO CARD" www/index.html
          ! grep -qi 'id="designer"' www/index.html
          ! grep -qi 'id="designerBtn"' www/index.html
          grep -q "telemetry-attributes.json" www/index.html
          grep -q "V4 ATTRIBUTE CHECKBOX TO DASHBOARD" www/index.html
          grep -q "V4 BRIDGE AUDIT SINGLE NATIVE CONTROLLER" www/index.html
          ! grep -q "V4 PERSISTENT BRIDGE SINGLE OWNER" www/index.html
          ! grep -q "V4 FIXED NETWORK 8788 PS5 71" www/index.html
      - name: Add Android
        run: npx cap add android
      - name: Sync
        run: npx cap sync android
      - name: Patch Android background
        run: node scripts/patch-android-background.js
      - name: Allow local HTTP network
        run: node scripts/patch-android-network.js
      - name: Gradle permission
        run: chmod +x android/gradlew
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace
      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/GT7-Telemetria-V4.09-Bridge-Nativa-debug.apk"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GT7-Telemetria-V4.09-Bridge-Nativa
          path: release/GT7-Telemetria-V4.09-Bridge-Nativa-debug.apk
