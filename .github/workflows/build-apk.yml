name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Fix windows and card height
        run: node scripts/patch-v4-windows-card-height.js
      - name: Apply independent hard navigation
        run: node scripts/patch-v4-hard-nav.js
      - name: Apply fixed Bridge and PS5 network
        run: node scripts/patch-v4-fixed-network.js
      - name: Apply RPM C gauge and full-frame
        run: node scripts/patch-v4-rpm-c-fullframe.js
      - name: Separate RPM total and fuel cards
        run: node scripts/patch-v4-separate-rpm-total-fuel.js
      - name: Add custom item builder with three slots
        run: node scripts/patch-v4-custom-items-3-slots.js
      - name: Apply laps fuel and reference fixes
        run: node scripts/patch-v4-laps-fuel-references.js
      - name: Apply designer editing and scroll fixes
        run: node scripts/patch-v4-designer-edit-scroll-dashboard.js
      - name: Apply final total builder layout and font fixes
        run: node scripts/patch-v4-total-builder-layout-fonts.js
      - name: Add Android
        run: npx cap add android
      - name: Sync
        run: npx cap sync android
      - name: Patch Android background
        run: node scripts/patch-android-background.js
      - name: Allow local HTTP network
        run: node scripts/patch-android-network.js
      - name: Gradle permission
        run: chmod +x android/gradlew
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace
      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/GT7-Telemetria-V4.02-debug.apk"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GT7-Telemetria-V4.02
          path: release/GT7-Telemetria-V4.02-debug.apk