name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Fix windows and card height
        run: node scripts/patch-v4-windows-card-height.js

      - name: Apply independent hard navigation
        run: node scripts/patch-v4-hard-nav.js

      - name: Apply RPM C gauge and full-frame
        run: node scripts/patch-v4-rpm-c-fullframe.js

      - name: Separate RPM total and fuel cards
        run: node scripts/patch-v4-separate-rpm-total-fuel.js

      - name: Apply laps and fuel fixes
        run: node scripts/patch-v4-laps-fuel-references.js

      - name: Apply performance and stability fix
        run: node scripts/patch-v4-performance-stability.js

      - name: Compact cards and section max speed
        run: node scripts/patch-v4-compact-core-cards-section-max.js

      - name: Organize dashboard and add movement arrows
        run: node scripts/patch-v4-grid-arrows-all-attributes.js

      - name: Add total last lap and general average cards
        run: node scripts/patch-v4-total-last-average-cards.js

      - name: Remove card designer and install attribute database
        run: node scripts/patch-v4-remove-designer-expand-attributes.js

      - name: Add attribute checks to dashboard
        run: node scripts/patch-v4-attribute-checkbox-dashboard.js

      - name: Install automatic single Bridge
        run: node scripts/install-bridge-from-v408-apk.js

      - name: Validate final web package
        run: |
          test -s www/index.html
          test -s www/bridge-v408.js
          test -s www/telemetry-attributes.json
          node --check www/bridge-v408.js
          node -e "JSON.parse(require('fs').readFileSync('www/telemetry-attributes.json','utf8'))"
          grep -q 'bridge-v408.js' www/index.html
          grep -q 'http://192.168.1.70:8788' www/bridge-v408.js
          grep -q "const PS5 = '192.168.1.71'" www/bridge-v408.js
          grep -q '__gt7BridgeControllerStarted' www/bridge-v408.js
          test "$(grep -c '__gt7BridgeControllerStarted = true' www/bridge-v408.js)" -eq 1
          ! grep -q 'http://192.168.1.70:8787' www/index.html
          ! grep -q '192.168.1.68' www/index.html

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Allow local HTTP network
        run: node scripts/patch-android-network.js

      - name: Validate no background services or extra permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          ! grep -q 'TelemetryForegroundService' "$MANIFEST"
          ! grep -q 'TelemetryBootReceiver' "$MANIFEST"
          ! grep -q 'android.permission.WAKE_LOCK' "$MANIFEST"
          ! grep -q 'android.permission.FOREGROUND_SERVICE' "$MANIFEST"
          ! grep -q 'android.permission.FOREGROUND_SERVICE_DATA_SYNC' "$MANIFEST"
          ! grep -q 'android.permission.POST_NOTIFICATIONS' "$MANIFEST"
          ! grep -q 'android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS' "$MANIFEST"
          ! grep -q 'android.permission.RECEIVE_BOOT_COMPLETED' "$MANIFEST"

      - name: Gradle permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/GT7-Telemetria-V4.13-Sem-Segundo-Plano-debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GT7-Telemetria-V4.13-Sem-Segundo-Plano
          path: release/GT7-Telemetria-V4.13-Sem-Segundo-Plano-debug.apk