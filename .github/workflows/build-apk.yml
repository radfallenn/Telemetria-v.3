name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Patch Bridge V4 connection
        run: node scripts/patch-v4-bridge-connection.js
      - name: Patch native HTTP Bridge
        run: node scripts/patch-v4-native-http.js
      - name: Fix windows and card height
        run: node scripts/patch-v4-windows-card-height.js
      - name: Unlock normal windows
        run: node scripts/patch-v4-unlock-normal-windows.js
      - name: Add Android
        run: npx cap add android
      - name: Sync
        run: npx cap sync android
      - name: Patch Android background
        run: node scripts/patch-android-background.js
      - name: Allow local HTTP network
        run: node scripts/patch-android-network.js
      - name: Gradle permission
        run: chmod +x android/gradlew
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Telemetria-v4-unlocked-windows-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
