<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#000"><title>V4 Cockpit</title><style>:root{--c:#00e5ff;--r:#ff6c9a;--m:#98a3aa;--bg:#000;--card:#0c1112;--mono:"JetBrains Mono","Roboto Mono",Consolas,monospace;--ser:Georgia,"Times New Roman",serif}*{box-sizing:border-box}html,body{margin:0;background:#000;color:#f7fbff;font-family:var(--ser);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 18% 0,rgba(0,229,255,.14),transparent 34%),linear-gradient(#020606,#000 60%);pointer-events:none}.app{position:relative;z-index:1;max-width:820px;margin:auto;padding:18px 26px 120px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.title{font:900 48px Arial,sans-serif;color:#dffcff;letter-spacing:.03em;text-shadow:0 0 14px rgba(0,229,255,.3)}.pill{height:74px;min-width:240px;border-radius:38px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(#171b1c,#090a0b);display:flex;align-items:center;justify-content:center;gap:17px}.dot{width:22px;height:22px;border-radius:50%;background:var(--c);box-shadow:0 0 22px var(--c)}.pill b{font:800 22px Arial}.pill small{display:block;color:var(--m);font:400 19px Arial;margin-top:4px}.card{border:1px solid rgba(0,229,255,.28);border-radius:10px;background:linear-gradient(rgba(16,22,22,.85),rgba(4,6,6,.94));box-shadow:0 0 32px rgba(0,229,255,.11),inset 0 0 28px rgba(0,229,255,.055);overflow:hidden}.bridge{height:88px;margin-bottom:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-color:rgba(255,255,255,.11)}.label{font-size:19px;letter-spacing:.13em;text-transform:uppercase;color:var(--m);font-weight:800}.bridge .val{font-size:26px;color:var(--c);font-weight:900;margin-top:6px}.hero{height:222px;display:grid;grid-template-columns:1.08fr .92fr; ><div id="best" class="val">--</div></div><div class="card tile"><div class="label">ÚLTIMA VOLTA</div><div id="last" class="val">--</div></div><div class="card tile"><div class="label">VOLTAS VÁLIDAS</div><div id="valid" class="val cyan">0</div></div><div class="card tile wide"><div class="label">MAX SPEED</div><div id="max" class="val">0</div></div></div></section><section id="atrib" class="page"><div class="grid"><div class="card tile"><div class="label">PACKETS</div><div id="packets" class="val cyan">0</div></div><div class="card tile"><div class="label">FUEL</div><div id="fuel" class="val cyan">--</div></div><div class="card tile wide"><pre id="raw" class="raw">Aguardando.</pre></div></div></section><section id="voltas" class="page"><div class="grid"><div class="card tile"><div class="label">VOLTA ATUAL</div><div id="lap" class="val cyan">0</div></div><div class="card tile"><div class="label">MÉDIA</div><div id="avg" class="val">--</div></div></div></section><section id="set" class="page"><div class="card tile wide"><div class="label">BRIDGE URL</div><input id="url" class="inp"><button id="save" class="btn">SALVAR</button><button id="test" class="btn">TESTAR</button></div></section></div><div class="nav"><div class="navIn"><button class="nb on" data-p="dash">☄<br>DASH</button><button class="nb" data-p="atrib">▥<br>ATRIB</button><button class="nb" data-p="voltas">⚑<br>VOLTAS</button><button class="nb" data-p="set">⚙<br>SET</button></div></div><script>const $=i=>document.getElementById(i),q=s=>[...document.querySelectorAll(s)];let base=localStorage.getItem('gt7_bridge_url')||'http://192.168.1.70:8788';$('url').value=base;let H={},L={},S={},LAT=0;const g=(o,p,d=null)=>p.split('.').reduce((a,k)=>a&&a[k]!=null?a[k]:undefined,o)??d,one=(...v)=>v.find(x=>x!==undefined&&x!==null&&x!==''&&!Number.isNaN(x))??0,n=v=>Number.isFinite(+v)?+v:0;function ms(v){v=n(v);if(v<=0)return'--';let h=Math.floor(v/36e5),m=Math.floor((v%36e5)/6e4),s=Math.floor((v%6e4)/1e3),x=Math.floor(v%1e3);return(h?String(h).padStart(2,'0')+':':'')+String(m).padStart(h?2:1,'0')+':'+String(s).padStart(2,'0')+'.'+String(x).padStart(3,'0')}function tm(){let d=one(g(S,'totalCompletedLapMs',null),g(S,'totalTimeMs',null),g(L,'lap.totalCompletedMs',null));if(d)return n(d);let a=g(S,'laps',[]);return Array.isArray(a)?a.map(x=>n(x.timeMs??x.ms??x.lapMs??0)).filter(Boolean).reduce((p,c)=>p+c,0):0}function vl(){return Math.max(0,Math.trunc(n(one(g(S,'validLaps',null),g(L,'lap.validLaps',null),g(L,'lap.currentLap',null),0)))-1)}function flat(){return{ok:!!one(g(L,'packet.connected',null),g(L,'legacy.connected',null),g(H,'connectedToPs5',false)),ver:one(g(L,'packet.version',null),g(L,'legacy.packetVersion',null),'GT7-UDP'),pkt:one(g(L,'legacy.packetCount',null),g(L,'packet.packetId',null),g(H,'packets',0)),sp:one(g(L,'car.speedKmh',null),g(L,'legacy.speedKmh',null),g(L,'legacy.speed',null),0),rpm:one(g(L,'car.rpm',null),g(L,'legacy.rpm',null),0),gear:one(g(L,'car.gear',null),g(L,'legacy.gear',null),'N'),thr:one(g(L,'input.throttlePct',null),g(L,'legacy.throttlePct',null),0),brk:one(g(L,'input.brakePct',null),g(L,'legacy.brakePct',null),0),best:one(g(L,'lap.bestLapMs',null),g(S,'bestLapMs',null),0),last:one(g(L,'lap.lastLapMs',null),g(S,'lastLapMs',null),0),avg:one(g(S,'averageLapMs',null),0),lap:one(g(L,'lap.currentLap',null),g(S,'validLaps',null),0),max:one(g(L,'car.maxSpeedSessionKmh',null),g(L,'legacy.maxSpeedSessionKmh',null),g(S,'maxSpeedKmh',null),0),fuel:one(g(L,'fuel.percent',null),g(L,'fuel.levelLiters',null),null)}}function mark(v){let m=$('marker');if(!m.dataset.ok){m.innerHTML=Array.from({length:24},(_,i)=>'<i class="seg" style="height:'+(16+i*1.35)+'px"></i>').join('');m.dataset.ok=1}[...m.children].forEach((e,i)=>e.classList.toggle('on',i<Math.round(Math.max(0,Math.min(1,n(v)/300))*24)))}function R(){let f=flat();$('st').textContent=f.ok?'OK':'WAIT';$('lat').textContent=LAT+'ms';$('dot').style.background=f.ok?'var(--c)':'#555';$('bridge').textContent='OK';$('spe
